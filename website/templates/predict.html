<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exoplanet Detection - Prediction</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
  body {
  font-family: 'Orbitron', sans-serif;
  background-color: #000011;

  /* Remove the old background-image lines */
  /* background-image: radial-gradient(...), radial-gradient(...); */

  /* Add your image background instead */
  background-image: url('https://assets.science.nasa.gov/dynamicimage/assets/science/astro/exo-explore/2023/09/h/holiday16x9.jpg?w=1600&h=900&fit=clip&crop=faces%2Cfocalpoint'); /* You can use a local path or a URL */
  background-size: cover;     /* Make it fill the screen */
  background-repeat: no-repeat;
  background-position: center center;

  color: #e0e0e0;
  padding: 40px;
}


    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px;
      background-color: rgba(13, 27, 42, 0.85);
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    h1 {
      text-align: center;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      font-size: 40px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
      color: #00ffff;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #00ffff;
      background-color: #111;
      color: #fff;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 25px;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(45deg, #00ffff, #0077ff);
      color: #000;
      border: none;
      border-radius: 50px;
      box-shadow: 0 0 15px #00ffff;
      cursor: pointer;
    }

    .result {
      text-align: center;
      margin-top: 30px;
    }

    .result h3 {
      font-size: 26px;
      color: #00ff00;
    }

    .result .probability {
      font-size: 18px;
      color: #ffaa00;
      margin-top: 10px;
    }

    #donutChart {
      max-width: 400px;
      margin: 30px auto;
    }

    .back-btn {
      display: block;
      margin: 30px auto 0;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(45deg, #00ffff, #0077ff);
      color: #000;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 0 10px #00ffff;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔮 Exoplanet Prediction</h1>

    <form method="POST">
      {% for feature in features %}
        <div class="form-group">
          <label for="{{ feature }}">{{ feature }}</label>
          <input type="text" id="{{ feature }}" name="{{ feature }}" required>
        </div>
      {% endfor %}
      <button type="submit">Predict</button>
    </form>

    {% if prediction %}
      <div class="result">
        <h3>{{ prediction }}</h3>
        <p class="probability">
          Probability: ❌ False Positive: {{ (proba[0]*100)|round(2) }}% |
          ✅ Confirmed Exoplanet: {{ (proba[1]*100)|round(2) }}%
        </p>

        <!-- Donut Chart -->
        <canvas id="donutChart"></canvas>

        <script>
          const ctx = document.getElementById('donutChart').getContext('2d');
          const donutChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: ['False Positive', 'Confirmed Exoplanet'],
              datasets: [{
                label: 'Prediction Probability',
                data: [{{ (proba[0]*100)|round(2) }}, {{ (proba[1]*100)|round(2) }}],
                backgroundColor: ['#ff4d4d', '#00ff99'],
                borderColor: '#111',
                borderWidth: 2
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    color: '#ffffff',
                    font: {
                      size: 14
                    }
                  }
                }
              }
            }
          });
        </script>
      </div>
    {% endif %}

    <a href="/" class="back-btn">← Back to Home</a>
  </div>
</body>
</html>
