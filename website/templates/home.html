<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exoplanet Detection - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            background: url('https://science.nasa.gov/wp-content/uploads/2020/09/5k-exo-beauty-lores-final.png') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
        }

        .overlay {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Slightly lighter overlay (was 0.9) */
            padding: 60px 20px;
            position: relative;
        }

        h1 {
            font-size: 64px;
            margin-bottom: 20px;
            color: #add8e6; /* Light blue (sky blue) */
            text-shadow: 0 0 8px #add8e6;
        }

        p {
            font-size: 28px;
            max-width: 900px;
            margin-bottom: 50px;
            color: #ddd;
        }

        .buttons {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(45deg, #add8e6, #87cefa); /* Light blue gradient */
            color: #000;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 0 15px #add8e6;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #87cefa, #add8e6);
        }

        /* Hamburger Menu Styles */
        .hamburger {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #fff;
            z-index: 20;
        }

        .menu-content {
            position: absolute;
            top: 60px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            padding: 1em;
            border-radius: 5px;
            z-index: 10;
            text-align: right;
        }

        .menu-content.show {
            display: block;
        }

        .menu-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-content ul li {
            margin-bottom: 0.7em;
        }

        .menu-content a {
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 0.5em 1em;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 42px;
            }

            p {
                font-size: 20px;
            }

            .btn {
                padding: 16px 32px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="overlay">
        <div class="hamburger" onclick="toggleMenu()">
            <i class="fas fa-bars"></i> <!-- Hamburger icon -->
        </div>
        <div class="menu-content">
            <ul>
                <li><a href="finding_planets.html">5 Ways to Find Exoplanets</a></li>
                <li><a href="Exoplanet_overview.html">Exoplanet Types</a></li>
                <li><a href="ML_importance.html">ML Importance</a></li>
                <li><a href="search_for_life.html">Search for Life</a></li>
            </ul>
        </div>
        <h1>Exoplanet Detection</h1>
        <p>Explore how machine learning is revolutionizing the discovery of planets beyond our solar system using NASA's Kepler mission data.</p>
        <div class="buttons">
            <a href="/introduction" class="btn">🪐 Introduction</a>
            <a href="/features" class="btn">📘 Know More</a>
            <a href="/predict" class="btn">🔮 Try It Out</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.querySelector('.menu-content');
            menu.classList.toggle('show');
        }
    </script>
</body>

</html>
