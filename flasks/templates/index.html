<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exoplanet Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #000011;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 100px 100px;
      background-position: 0 0, 50px 50px;
      color: #e0e0e0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #00ffff;
      text-shadow: 0 0 8px #00ffff;
      margin-bottom: 20px;
    }

    form {
      max-width: 800px;
      margin: 0 auto;
      background-color: rgba(13, 27, 42, 0.85);
      padding: 25px 35px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #aeefff;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #00ffff;
      border-radius: 8px;
      background-color: #021018;
      color: #ffffff;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, #00ffff, #0077ff);
      color: #000;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 10px #00ffff;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: linear-gradient(45deg, #0077ff, #00ffff);
      transform: scale(1.03);
    }

    .result {
      margin-top: 30px;
      text-align: center;
      font-size: 22px;
      color: #ffffff;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    }

    .proba {
      margin-top: 10px;
      font-size: 16px;
      color: #aeefff;
    }

    .chart-container {
      max-width: 400px;
      margin: 30px auto;
    }

    .rocket {
      display: inline-block;
      animation: float 1.5s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>🪐 Exoplanet Predictor</h1>
  <form method="POST">
    {% for feature in features %}
    <div class="form-group">
      <label for="{{ feature }}">{{ feature.replace('_', ' ').title() }}</label>
      <input type="text" name="{{ feature }}" id="{{ feature }}" required>
    </div>
    {% endfor %}
    <button type="submit" class="submit-btn">🚀 Predict Now</button>
  </form>

  {% if prediction %}
  <div class="result">
    <p><strong>🛰️ Prediction Result:</strong> {{ prediction }}</p>
    <div class="proba">
      <p>❌ False Positive Probability: {{ '{:.2f}'.format(proba[0] * 100) }}%</p>
      <p>✅ Confirmed Exoplanet Probability: {{ '{:.2f}'.format(proba[1] * 100) }}%</p>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="probaChart"></canvas>
  </div>

  <script>
    const ctx = document.getElementById('probaChart').getContext('2d');
    const probaChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['False Positive', 'Confirmed Exoplanet'],
        datasets: [{
          data: [{{ proba[0] }}, {{ proba[1] }}],
          backgroundColor: ['#ff4c4c', '#00ffcc'],
          borderWidth: 1,
          hoverOffset: 10
        }]
      },
      options: {
        plugins: {
          legend: {
            labels: {
              color: '#ffffff',
              font: {
                size: 14
              }
            }
          }
        }
      }
    });
  </script>
  {% endif %}

</body>
</html>
